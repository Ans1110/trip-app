services:
  bff:
    build:
      context: ./bff
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      BACKEND_URL: http://app:8080
      BACKEND_INTERNAL_URL: http://app:8080
      COOKIE_SECURE: "false"
      COOKIE_DOMAIN: "localhost"
      NEXT_PUBLIC_APP_NAME: TripAPP
      NEXT_PUBLIC_WS_URL: ws://localhost:8080
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped

  web:  
      build:
        context: ./web
        dockerfile: Dockerfile
        args:
          NEXT_PUBLIC_BFF_URL: http://bff:3000
          NEXT_PUBLIC_WS_URL: ws://app:8080
      ports:
        - "3002:3002"
      depends_on:
        - bff
      restart: unless-stopped
      
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      CONFIG_PATH: /app/config/config.yaml
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_DBNAME: tripapp_db
      DATABASE_SSLMODE: disable
      REDIS_ADDR: redis:6379
    volumes:
      - ./config:/app/config:ro
      - ./keys:/app/keys:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tripapp_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/proxy_params:/etc/nginx/proxy_params:ro
    depends_on:
      - app
      - web
      - bff
    restart: unless-stopped  

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - miniodata:/data

  pgbouncer:
    image: edoburu/pgbouncer:latest
    environment:
      DATABASE_URL: "postgres://postgres:postgres@postgres:5432/tripapp_db"
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 200
      DEFAULT_POOL_SIZE: 20
      AUTH_TYPE: md5
      ADMIN_USERS: postgres
    ports:
      - "5434:5432"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  miniodata: