worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    '$request_time';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    client_max_body_size 50m;

    gzip on;
    gzip_types text/plain application/json application/javascript text/css application/xml;
    gzip_min_length 1024;
    gzip_comp_level 4;
    gzip_proxied any;
    gzip_vary on;

    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=cache_zone:10m max_size=512m inactive=10m use_temp_path=off;
    proxy_cache_key "$scheme$request_method$host$request_uri";

    # rate limiting
    # general API
    limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
    # auth endpoints
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;

    upstream tripapp {
        server app:8080;
        keepalive 32;
    }

    # main server
    server {
        listen 80;
        server_name _;

        # Secure headers
        add_header X-Content-Type-Options  "nosniff"         always;
        add_header X-Frame-Options         "DENY"            always;
        add_header X-XSS-Protection        "1; mode=block"   always;
        add_header Referrer-Policy         "strict-origin"   always;

        # CORS
        set $cors_origin "";
        if ($http_origin ~* "^(http://localhost:[0-9]+|https://tripapp\.com|https://www\.tripapp\.com)$") {
            set $cors_origin $http_origin;
        }
        add_header Access-Control-Allow-Origin  $cors_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Request-ID" always;
        add_header Access-Control-Max-Age      86400 always;

        # preflight
        location / {
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin  $cors_origin;
                add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS";
                add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Request-ID";
                add_header Access-Control-Max-Age 86400;
                return 204;
            }

            # fallback  
            default_type application/json;
            return 404 '{"error":"Not Found"}';
        }

        # public routes 

        # ws routes

        # protected routes

        # 404 fallback
        location / {
            return 404 '{"error":"Not Found"}';
            add_header Content-Type application/json;
        } 
    }
}